<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Upload Dokumen - RAG Uploader</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .box { margin: auto; }
  </style>
</head>
<body>
  <div class="box">
    <div style="margin-bottom:20px">
      <label for="kategori" style="font-weight:bold">Kategori:</label>
      <select name="kategori" id="kategori" required style="margin-left:10px">
        <option value="">-- Pilih Kategori --</option>
        <option value="keuangan">Keuangan</option>
        <option value="sdm">SDM</option>
        <option value="operasional">Operasional</option>
        <option value="teknologi">Teknologi</option>
        <option value="hukum">Hukum</option>
      </select>
    </div>
    <h2>Upload Source(PDF / TXT)</h2>
    <form id="u" enctype="multipart/form-data" method="post" action="/upload">
      <input type="file" name="file" accept=".pdf,.txt" required />
      <br/><br/>
      <button type="submit" style="background-color: aquamarine;">Upload & Index</button>
    </form>
    <div id="status"></div>
    <div id="progressBox" style="margin:10px 0;display:none">
      <div id="progressText" style="font-weight:bold"></div>
      <div style="background:#eee;border-radius:5px;height:18px;width:100%;max-width:400px;overflow:hidden">
        <div id="progressBar" style="background:#4caf50;height:18px;width:0%;transition:width 0.2s"></div>
      </div>
    </div>
    <hr/>
    <div style="display:flex; gap:30px; align-items:flex-start;">
      <div style="max-width:500px;">
        <h2>Knowledge AI</h2>
        <div id="docList" style="min-height:500px; max-height:600px; overflow-y:auto; background:#f9f9f9; border-radius:8px; border:1px solid #eee; padding:12px;">Memuat...</div>
      </div>
      <div style="flex:1;">
        <h2>RAG Search [<span id="labelKategori"></span>]</h2>
        <form id="searchForm">
          <input type="text" id="question" name="question" placeholder="Tulis pertanyaan..." style="width:80%" required />
          <button type="submit">Cari</button>
        </form>
        <div id="searchResult"></div>
      </div>
    </div>
  </div>
  <script>
    // Upload dokumen
    const f = document.getElementById('u');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
  const fd = new FormData(f);
  // Pastikan kategori ikut dikirim
  fd.append('kategori', document.getElementById('kategori').value);
      document.getElementById('status').innerText = 'Uploading...';
      document.getElementById('progressBox').style.display = 'block';
      document.getElementById('progressText').innerText = '';
      document.getElementById('progressBar').style.width = '0%';
      // Mulai stream progress
      let evtSource = new EventSource('/progress-stream');
      evtSource.onmessage = function(e) {
        if (e.data.startsWith('Progress:')) {
          const match = e.data.match(/Progress: (\d+)% \((\d+)[^\d]+(\d+)\)/);
          if (match) {
            const percent = match[1];
            document.getElementById('progressText').innerText = e.data;
            document.getElementById('progressBar').style.width = percent + '%';
          }
        }
      };
      evtSource.onerror = function() {
        evtSource.close();
      };
      const res = await fetch('/upload', { method: 'POST', body: fd });
      const j = await res.json();
      document.getElementById('status').innerText = ""; //JSON.stringify(j, null, 2);
      setTimeout(() => {
        evtSource.close();
        //document.getElementById('progressBox').style.display = 'none';
        loadDocs(); // refresh daftar dokumen setelah indexing selesai
      }, 3000);
    });

    // Pencarian RAG
    const sf = document.getElementById('searchForm');
    sf.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = document.getElementById('question').value;
      const kategori = document.getElementById('kategori').value;
      document.getElementById('searchResult').innerText = 'Mencari...';
      const res = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, kategori })
      });
      const j = await res.json();
      if (j.ok) {
        let html = '<b>Jawaban LLM:</b><br/><div style="background:#f6f6f6;padding:10px;border-radius:5px;margin-bottom:10px">' + (j.answer || '-') + '</div>';
        // html += '<b>Konteks hasil pencarian:</b><br/><ul>';
        // for (const r of j.results) {
        //   html += `<li><pre>${r.text}</pre></li>`;
        // }
        // html += '</ul>';
        document.getElementById('searchResult').innerHTML = html;
      } else {
        document.getElementById('searchResult').innerText = 'Error: ' + (j.error || 'Tidak ada hasil');
      }
    });
    // Daftar dokumen dan hapus
    async function loadDocs() {
      const kategori = document.getElementById('kategori').value;
      const res = await fetch('/docs?kategori=' + encodeURIComponent(kategori));
      const j = await res.json();
      if (j.ok) {
        let html = '<table style="width:100%;border-collapse:collapse">';
        html += '<thead><tr style="background:#eee"><th style="text-align:left;padding:8px;border-bottom:1px solid #ddd">Nama File</th><th style="text-align:left;padding:8px;border-bottom:1px solid #ddd">Kategori</th><th style="padding:8px;border-bottom:1px solid #ddd">Aksi</th></tr></thead><tbody>';
        for (const f of j.files) {
          console.log(f);
          html += `<tr><td style="padding:8px;border-bottom:1px solid #eee">${f.nama || f}</td><td style="padding:8px;border-bottom:1px solid #eee">${f.kategori || kategori}</td><td style="padding:8px;border-bottom:1px solid #eee"><button onclick="deleteDoc('${f.nama || f}')">Hapus</button></td></tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('docList').innerHTML = html;
      } else {
        document.getElementById('docList').innerText = 'Gagal memuat dokumen';
      }
    }
    async function deleteDoc(filename) {
      if (!confirm('Hapus dokumen ' + filename + '?')) return;
      const kategori = document.getElementById('kategori').value;
      const res = await fetch('/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename, kategori })
      });
      const j = await res.json();
      if (j.ok) {
        alert('Dokumen dihapus dan index diperbarui');
        loadDocs();
      } else {
        alert('Gagal hapus: ' + (j.error || 'Unknown error'));
      }
    }
    // Endpoint untuk daftar dokumen
    document.getElementById('kategori').addEventListener('change', () => {
      loadDocs();
      document.getElementById('status').innerText = '';
      document.getElementById('searchResult').innerText = '';
      document.getElementById('labelKategori').innerText = document.getElementById('kategori').value || "";

    });
    loadDocs();
  </script>
</body>
</html>
